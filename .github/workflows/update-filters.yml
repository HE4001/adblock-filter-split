name: Update AdBlock Filters

on:
  # 每天北京时间中午 12:00 (UTC 04:00) 自动运行
  schedule:
    - cron: '0 4 * * *'

  # 支持手动触发
  workflow_dispatch:

# 确保同一时间只有一个工作流在运行
concurrency:
  group: update-filters
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 需要写权限来 push 变更

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行处理脚本
        run: python scripts/process_filters.py

      - name: 检查文件变更
        id: diff
        run: |
          if git diff --quiet rules/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "规则文件无变化，跳过提交。"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到规则文件有更新。"
          fi

      - name: 提交并推送变更
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/*.txt rules/stats.json

          TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          git commit -m "📦 更新规则 - ${TIMESTAMP} CST"

          git push
